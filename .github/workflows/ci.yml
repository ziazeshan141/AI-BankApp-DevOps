name: CI - Security Scanning

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:

  # ============================================================
  # GATE 1: SECRET SCANNING (Gitleaks)
  # ============================================================
  gitleaks:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Gitleaks needs full history to scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # GATE 2: LINT - Java Checkstyle
  # ============================================================
  lint:
    name: Lint - Checkstyle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check || true # Audit mode for now to avoid blocking on style

  # ============================================================
  # GATE 3: SAST - Static Application Security Testing
  # ============================================================
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: [gitleaks, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/java
            p/owasp-top-ten
            p/secrets

  # ============================================================
  # GATE 4: SCA - Software Composition Analysis
  # ============================================================
  # ---------- Gate 4: SCA ----------
  sca:
    runs-on: ubuntu-latest
    needs: sast
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Compute cache key (weekly)
        id: cache-key
        run: echo "week=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ./dc-data
          key: nvd-db-${{ steps.cache-key.outputs.week }}
          restore-keys: |
            nvd-db-

      - name: OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 40
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            mvn -B org.owasp:dependency-check-maven:check \
              -DnvdApiKey=$NVD_API_KEY \
              -DdataDirectory=./dc-data
